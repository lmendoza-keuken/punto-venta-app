name: punto_venta_app
description: A Flutter POS application with BLoC architecture
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  bloc: 9.0.0
  flutter_bloc: 9.0.0
  equatable: ^2.0.5
  
  # Navigation
  go_router: 14.8.0
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Storage
  shared_preferences: 2.5.3
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # JSON Serialization
  json_annotation: 4.9.0

   # Freezed
  freezed_annotation: 2.4.4
  
  # HTTP requests
  http: 1.3.0

  dio: 5.4.0
  
  # Date formatting
  intl: 0.20.2
  
  # UI
  cupertino_icons: 1.0.8
  font_awesome_flutter: 10.9.0
  uuid: 4.5.1
  flutter_svg: ^2.0.10

  
  # Firebase
  firebase_core: 3.12.0
  firebase_auth: 5.5.0
  cloud_firestore: 5.6.4
  google_sign_in: ^6.2.2

 

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  freezed: 2.3.0
  json_serializable: ^6.7.1
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/